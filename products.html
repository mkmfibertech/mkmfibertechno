<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>MKM Fiber Store</title>

		<div id="header-container"></div>
	</head>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#f5f5f5;
	 padding-bottom: 220px;
}



.container{
    padding:15px;
}

.section-title{
    margin:20px 0 10px;
    font-size:18px;
    font-weight:bold;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:10px;
}

.card{
    background:#fff;
    padding:10px;
    border-radius:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
    text-align:center;
}

.card img {
    width: 100%;
    height: 220px;
    object-fit: contain;
    background: white;
    padding: 10px;
}

button{
    background:#25D366;
    color:#fff;
    border:none;
    padding:8px;
    margin-top:5px;
    width:100%;
    border-radius:6px;
    cursor:pointer;
}

.cart-box{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:#fff;
    border-top:2px solid #ddd;
    padding:10px;
    max-height:200px;
    overflow:auto;
}

.cart-title{
    font-weight:bold;
    margin-bottom:5px;
}

.send-btn{
    background:#007bff;
    margin-top:10px;
}

	.price {
    font-size: 18px;
    font-weight: bold;
    color: #25D366;
    margin: 10px 0;
}

.old-price {
    text-decoration: line-through;
    color: #999;
    display: block;
}

.new-price {
    color: red;
    font-size: 20px;
    font-weight: bold;
}
</style>

</head>
<body>


<div class="container">

<!-- العملاء -->
<div class="section-title">👤 العملاء</div>

<div class="grid">

<div class="card">
<img src="images/products/patch-cord.jpeg">
<h4>Patch Cord</h4>
<button onclick="addToCart('Patch Cord')">أضف للسلة</button>
</div>

<div class="card">
<img src="images/products/coupler.jpg">
<h4>Coupler</h4>
<p class="price">50 EGP</p>
<button onclick="addToCart('Coupler',50)">أضف للسلة</button>
</div>

<div class="card">
<img src="images/products/termination-box2coupler.jpg">
<h4>Termination Box</h4>
<button onclick="addToCart('Termination Box')">أضف للسلة</button>
</div>

</div>


<!-- الفنيين -->
<div class="section-title">🧑‍🔧 الفنيين والشركات</div>

<div class="grid">

<div class="card">
<img src="images/products/fastconnector-white-scapc.png">
<h4>Fast Connector</h4>
	<span class="old-price">490 EGP</span>
<span class="new-price">385 EGP</span>
<button onclick="addToCart('Fast Connector sc apc')">أضف للسلة</button>
</div>

<div class="card">
<img src="images/products/cleaver-fc-6s.jpg">
<h4>Cleaver FC-6S</h4>
<button onclick="addToCart('Cleaver FC-6S')">أضف للسلة</button>
</div>

<div class="card">
<img src="images/products/strip-green.jpg">
<h4>Stripper</h4>
<button onclick="addToCart('Stripper Green')">أضف للسلة</button>
</div>

<div class="card">
<img src="images/products/rj-strip.jpg">
<h4>RJ Stripper</h4>
<button onclick="addToCart('RJ Stripper')">أضف للسلة</button>
</div>

<div class="card">
<img src="images/products/kohol-bottle.jpeg">
<h4>Kohol Bottle</h4>
<button onclick="addToCart('Kohol Bottle')">أضف للسلة</button>
</div>

<div class="card">
<img src="images/products/fiberheatshrink6cm.jpg">
<h4>Heatshrink 6cm</h4>
<button onclick="addToCart('Heatshrink 6cm')">أضف للسلة</button>
</div>

  <div class="card">
<img src="images/products/tools-kit-6tools.jpg">
<h4>Tools Kit 6 Tools</h4>

<button onclick="addToCart('Tools Kit 6 Tools')">
أضف للسلة
</button>

</div>
</div>

<!-- السلة -->
<div class="cart-box">

<div class="cart-title">🛒 السلة</div>

<div id="cart"></div>

<button class="send-btn" onclick="sendWhatsApp()">
📲 إرسال الطلب على واتساب
</button>

</div>

<script>

let cart = [];

function addToCart(name, price){
    let item = cart.find(i => i.name === name);

    if(item){
        item.qty++;
    } else {
        cart.push({
            name: name,
            price: price,
            qty: 1
        });
    }

    renderCart();
}

function renderCart(){

    let box = document.getElementById("cart");
    let total = 0;

    box.innerHTML = "";

    cart.forEach(i => {

        total += i.price * i.qty;

        box.innerHTML += `
        <div>
            ${i.name} × ${i.qty}
            = ${i.price * i.qty} EGP
        </div>
        `;
    });

    box.innerHTML += `
        <hr>
        <strong>الإجمالي: ${total} EGP</strong>
    `;
}

function sendWhatsApp(){

    let phone = "201012646236";

    let total = 0;

    let msg = "طلب جديد من MKM Fiber Techno:%0A%0A";

    cart.forEach(i => {

        total += i.price * i.qty;

        msg += `• ${i.name} × ${i.qty} = ${i.price * i.qty} EGP%0A`;
    });

    msg += `%0Aالإجمالي: ${total} EGP`;

    window.open(
      `https://wa.me/${phone}?text=${msg}`,
      "_blank"
    );
}
</script>
	
<div id="footer-container"></div>

<script src="js/layout.js"></script>
</body>
</html>
